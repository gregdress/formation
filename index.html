<script>

const DATA = [{"id":1,"emoji":"💡","title":"Vision & Mindset","short":"Vision","color":"#dbeafe","tc":"#1d4ed8","lessons":[{"id":"l11","title":"Et si vendre des vêtements devenait un vrai métier ?","type":"Vision fondatrice","duree":"20 min","body":"<h2>Hook</h2><p>Et si tu pouvais générer un complément de revenus sans investissement, depuis chez toi, simplement avec des vêtements qui existent déjà autour de toi ?</p><hr><h2>Ce que les gens croient — et qui est faux</h2><p>Aujourd’hui, quand on pense à la revente de vêtements de seconde main, on imagine encore l’ancien modèle : acheter du stock avec le risque financier que ça implique, prendre des risques sur la qualité et les invendus, y passer des heures à tout gérer manuellement.</p><p><strong>Mais ça, c’est une ancienne vision.</strong></p><p>Le métier est en train de changer. Et si tu lis ces lignes maintenant, tu as l’opportunité de te positionner sur le nouveau modèle avant qu’il devienne mainstream.</p><hr><h2>Ce qui est possible aujourd’hui</h2><p>Aujourd’hui, tu peux travailler depuis chez toi à ton rythme, sans constituer de stock, sans investissement initial, avec des vêtements qui existent déjà dans les placards des gens autour de toi.</p><p>Tu peux devenir <strong>vendeur.se indépendant.e vêtements</strong>, à ton rythme, sans risque financier. Ce n’est plus un side hustle bricolé. C’est une vraie activité de revente vêtements, avec une structure, des outils, et un potentiel réel.</p><hr><h2>Mais soyons honnêtes</h2><p>Ce modèle est accessible. Il n’est pas magique.</p><ul><li>Ce n’est pas un revenu passif qui tombe sans rien faire</li><li>Ce n’est pas un système automatique qui tourne tout seul dès le premier jour</li><li>Une activité sans effort ni régularité, ça n’existe pas</li></ul><p>Ce que tu investis, c’est du temps et de l’organisation. La différence avec l’ancien modèle : le risque financier est nul. L’effort, lui, est bien réel — mais structuré, méthodique, accompagné par DressKare.</p><hr><h2>Ce que tu es en train de construire</h2><p>Tu ne te lances pas dans « vendre sur Vinted ». Tu te lances dans quelque chose de plus grand : <strong>devenir vendeur.se de vêtements dans une économie circulaire locale.</strong></p><hr><h2>À retenir</h2><blockquote>Ce n’est plus un side hustle bricolé. C’est une vraie activité revente vêtements, accessible sans investissement — à condition d’être régulier.se et organisé.e. DressKare est le système qui rend cette organisation possible à grande échelle.</blockquote>","quiz":[{"q":"Quelle est la principale différence entre l’ancien modèle de revente et le modèle DressKare ?","opts":["L’ancien modèle était plus rentable mais plus risqué","Le nouveau modèle permet de vendre sans investissement, en valorisant des vêtements déjà existants autour de soi","DressKare permet d’acheter des lots moins chers qu’ailleurs","Il n’y a pas de vraie différence — c’est juste du marketing"],"ok":1},{"q":"Qu’est-ce que ce modèle demande malgré l’absence d’investissement financier ?","opts":["Rien — c’est vraiment passif","Un abonnement mensuel à DressKare obligatoire","De la régularité et de l’organisation pour sourcer, photographier, publier et republier","D’habiter dans une grande ville"],"ok":2},{"q":"Comment doit-on se positionner mentalement face à cette activité ?","opts":["Comme un hobby qu’on fait quand on a le temps","Comme une vraie activité de vendeur.se indépendant.e dans une économie circulaire locale","Comme un investissement boursier à faible risque","Comme un complément de revenus sans aucune contrainte"],"ok":1}],"exercise":"<p><strong>À faire maintenant :</strong></p><ol><li>Réponds honnêtement : est-ce que tu vois cette activité comme un hobby ou comme une opportunité réelle ?</li><li>Note ton objectif de revenu mensuel. Un chiffre précis : ___&euro;/mois</li><li>Estime combien d’heures par semaine tu peux y consacrer réellement : ___h/semaine</li><li>Liste 5 personnes autour de toi qui ont des vêtements à vendre mais ne le font pas</li></ol><p>Ces 4 réponses sont la fondation de tout ce qui suit dans la formation.</p>"},{"id":"l12","title":"Le nouveau modèle : la revente locale et la circularité","type":"Vision différenciante","duree":"20 min","body":"<h2>Hook</h2><p>Le plus gros mensonge dans la seconde main, c’est de croire que tu dois aller chercher les vêtements loin.</p><hr><h2>La réalité : les vêtements sont déjà là</h2><p>La réalité, c’est que les vêtements sont déjà là : chez toi, autour de toi, chez des gens qui ne savent pas quoi en faire.</p><p>La Française moyenne possède 150 à 200 vêtements. Elle n’en porte régulièrement que 20%. Le reste est dans des placards, des cartons, attendant qu’on s’en occupe.</p><hr><h2>L’insight clé : les gens ne veulent pas vendre eux-mêmes</h2><p>Les gens autour de toi veulent souvent vendre leurs vêtements. Mais ils ne le font pas. Pourquoi ?</p><ul><li><strong>Manque de temps</strong> — photographier, rédiger, publier, gérer les messages, emballer, envoyer… c’est chronophage</li><li><strong>La flemme</strong> — tout ça pour vendre une robe à 12&euro;, ça ne motive pas</li><li><strong>La complexité perçue</strong> — ils ne savent pas comment fixer les prix, comment emballer, quelle étiquette utiliser</li></ul><p><strong>Et c’est là que ton rôle commence.</strong></p><hr><h2>Ce que tu fais concrètement</h2><ol><li><strong>Tu récupères</strong> — les vêtements de personnes qui veulent vider leurs placards</li><li><strong>Tu valorises</strong> — photos, description, prix juste, mise en ligne professionnelle</li><li><strong>Tu vends</strong> — sur Vinted et autres plateformes</li><li><strong>Tu reverses</strong> — une partie des ventes au propriétaire d’origine</li></ol><p>C’est simple. C’est utile. <strong>Tu résous un vrai problème pour de vraies personnes.</strong></p><hr><h2>La vision circulaire</h2><ul><li><strong>Moins de gaspillage textile</strong> — des vêtements retrouvent une seconde vie</li><li><strong>Plus de valeur locale</strong> — tu crées des revenus pour des gens autour de toi</li><li><strong>Plus de sens</strong> — tu es un.e acteur.rice de l’économie circulaire locale</li></ul><hr><h2>À retenir</h2><blockquote>Les vêtements qui vont alimenter ton activité existent déjà — dans les placards des gens autour de toi. Ton rôle n’est pas de les acheter, c’est de les valoriser. C’est ce qui différencie DressKare de tout le reste.</blockquote>","quiz":[{"q":"Pourquoi la plupart des gens ne vendent-ils pas leurs vêtements eux-mêmes ?","opts":["Parce qu’ils préfèrent donner à des associations","Parce que Vinted est trop compliqué","Parce que ça prend du temps, c’est fastidieux et la complexité perçue est trop grande","Parce qu’ils ne savent pas que Vinted existe"],"ok":2},{"q":"Qu’est-ce que le modèle de revente locale change fondamentalement ?","opts":["Il permet de faire plus de marge sur chaque article","Il élimine le risque lié à l’achat de stock et ancre l’activité dans un service utile à l’entourage","Il est plus rapide car les photos sont automatiques","Il permet d’éviter les frais Vinted"],"ok":1},{"q":"Que signifie ‘économie circulaire locale’ dans le contexte DressKare ?","opts":["Acheter des vêtements dans les friperies locales uniquement","Valoriser des vêtements déjà existants dans l’entourage proche, en évitant le gaspillage et en créant de la valeur localement","Revendre uniquement des vêtements fabriqués en France","Organiser des marchés de seconde main dans son quartier"],"ok":1}],"exercise":"<p><strong>À faire maintenant :</strong></p><ol><li>Liste 5 personnes autour de toi qui ont des vêtements à vendre mais ne le font pas</li><li>Pour chacune, note la raison probable pour laquelle elles ne vendent pas</li><li>Formule en une phrase comment tu pourrais leur proposer ton service</li></ol>"},{"id":"l13","title":"Comment transformer ça en complément de revenus concret","type":"Mécanique business","duree":"20 min","body":"<h2>Hook</h2><p>Cette vision est simple… mais elle ne fonctionne que si tu la structures.</p><hr><h2>Les 3 leviers de ton revenu</h2><h3>1. Le volume d’articles en ligne</h3><p>C’est le levier le plus puissant et le plus sous-estimé :</p><ul><li>30 articles actifs &rarr; quelques ventes aléatoires, revenu instable</li><li>100+ articles actifs &rarr; vrai complément de revenus, activité prévisible</li><li>200+ articles actifs &rarr; activité sérieuse, revenu mensuel significatif</li></ul><p>Le volume est la clé. <strong>Le volume.</strong></p><h3>2. La marge par article</h3><p>Un article vendu à 15&euro; avec 8&euro; de marge nette &times; 30 ventes/mois = 240&euro;. Le même article vendu à 25&euro; avec 15&euro; de marge &times; 30 ventes = 450&euro;. La sélection des pièces que tu acceptes impacte directement ta rentabilité.</p><h3>3. La régularité</h3><p>Une vendeuse qui publie 3 nouveaux articles tous les jours dépasse en 3 mois une vendeuse qui publie 50 articles une fois et n’y touche plus. L’algorithme Vinted favorise l’activité récente. La régularité bat la perfection.</p><hr><h2>L’équation simple</h2><p><strong>Revenu = Marge &times; Articles actifs &times; Régularité</strong></p><hr><h2>Le moment DressKare</h2><p>Plus tu récupères de vêtements, plus tu dois gérer du volume. <strong>Sans système, ça devient vite incontrôlable.</strong></p><p>Imagine : tu as 5 déposantes. Chacune t’a confié 30 pièces. Tu as 150 articles à gérer. Sans outil : tu ne sais plus quelle pièce appartient à qui, tu passes 10 minutes à créer chaque fiche manuellement, tu oublies de republier les articles qui stagnent.</p><p><strong>Avec DressKare :</strong> chaque dépôt est tracé, les fiches se créent en moins de 2 minutes grâce à l’IA, et la publication sur Vinted se fait en 1 clic. DressKare n’est pas un « nice to have ». C’est l’infrastructure qui rend le volume possible.</p><hr><h2>À retenir</h2><blockquote>La vision sans structure, ça reste un rêve. Les trois leviers de ton revenu sont le volume d’articles actifs, la marge par article, et la régularité. DressKare est le système qui te permet de tenir ces trois leviers à grande échelle.</blockquote>","quiz":[{"q":"Quel est le levier le plus puissant pour augmenter son revenu Vinted ?","opts":["Avoir les meilleures photos de la plateforme","Vendre uniquement des marques de luxe","Augmenter le volume d’articles actifs en ligne de façon régulière","Poster des stories Instagram chaque jour"],"ok":2},{"q":"Pourquoi DressKare devient-il indispensable dès qu’on monte en volume ?","opts":["Parce que Vinted l’exige pour les vendeurs pro","Parce que sans système, gérer plusieurs dépôts devient incontrôlable","Parce qu’il offre des remises sur les frais de port","Parce qu’il permet d’avoir plus d’avis positifs"],"ok":1},{"q":"Que signifie réellement ‘sans investissement’ dans le modèle DressKare ?","opts":["Aucun effort n’est nécessaire — c’est passif","Pas d’investissement financier, mais un investissement réel en temps et en organisation","On peut tout faire en 30 minutes par semaine","DressKare fait tout automatiquement à ta place"],"ok":1}],"exercise":"<p><strong>Calcule ton objectif :</strong></p><ol><li>Ton objectif mensuel net : ___&euro;</li><li>Ta marge nette estimée par article vendu : ___&euro;</li><li>Articles à vendre par mois nécessaires : objectif &divide; marge = ___ ventes/mois</li><li>Articles actifs nécessaires (taux de rotation 25-30%) : ventes &times; 3,5 = ___ articles</li><li>Articles à publier par semaine : ___ articles/semaine</li></ol><p><strong>Ce dernier chiffre est ton objectif de publication. Garde-le en tête pour toute la suite.</strong></p>"}]},{"id":2,"emoji":"🛍️","title":"Sourcing rentable","short":"Sourcing","color":"#dcfce7","tc":"#15803d","lessons":[{"id":"l21","title":"Resell vs Dépôt-vente — choisir ton modèle","type":"Stratégie","duree":"20 min","body":"<h2>Introduction</h2><p>Avant de sourcer quoi que ce soit, tu dois trancher une question fondamentale : <strong>quel modèle tu choisis ?</strong></p><p>Il en existe deux : le <strong>resell</strong> (achat-revente) et le <strong>dépôt-vente</strong>. Ce choix va impacter ton capital de départ, ton risque, ton temps, et ta rentabilité.</p><hr><h2>Le Resell — tu achètes pour revendre</h2><p>Tu achètes des vêtements (lots, friperies, vide-greniers, boxes...) pour les revendre à l’unité. Tu es propriétaire de ton stock.</p><p><strong>Avantages :</strong> contrôle total, marges de 2x à 4x le prix d’achat, prix libres, spécialisation possible.</p><p><strong>Contraintes :</strong> capital de départ 150-300&euro; minimum, gestion du stock physique, risque financier réel sur les invendus.</p><hr><h2>Le Dépôt-vente — tu vends pour les autres</h2><p>Tu ne possèdes pas les vêtements. Tu les reçois de tes déposants et tu prends une commission sur chaque vente réussie.</p><p><strong>Avantages :</strong> zéro capital de départ, zéro risque financier, accès aux marques haut de gamme (Sandro, Maje, Claudie Pierlot...), scalable sans limite.</p><p><strong>Contraintes :</strong> marge partagée avec le déposant, gestion des relations humaines, minimum 15 articles par dépôt.</p><hr><h2>Comparaison directe</h2><ul><li><strong>Capital nécessaire :</strong> Resell = 150-300&euro; / Dépôt-vente = 0&euro;</li><li><strong>Risque financier :</strong> Resell = réel / Dépôt-vente = nul</li><li><strong>Accès aux marques premium :</strong> Resell = difficile / Dépôt-vente = naturel</li><li><strong>Scalabilité :</strong> Resell = limitée par le capital / Dépôt-vente = illimitée</li></ul><hr><h2>DressKare fonctionne pour les deux modèles</h2><p><strong>Pour le dépôt-vente :</strong> chaque déposant a son propre espace dans l’app. Les commissions sont calculées automatiquement.</p><p><strong>Pour le resell :</strong> tu rentres ton stock comme un dépôt d’achat-revente. Import possible depuis Excel.</p><hr><h2>À retenir</h2><blockquote>Le dépôt-vente est le meilleur point d’entrée : zéro risque, zéro capital, accès aux meilleures pièces. Le resell apporte plus de contrôle et de marge mais demande un investissement initial. Les deux modèles sont compatibles avec DressKare.</blockquote>","quiz":[{"q":"Quel est le principal avantage du dépôt-vente par rapport au resell pour un vendeur qui démarre ?","opts":["Les marges sont plus élevées en dépôt-vente","Le dépôt-vente nécessite zéro capital de départ et zéro risque financier","Il est plus facile de trouver des déposants que des lots","Vinted favorise les vendeurs en dépôt-vente dans l’algorithme"],"ok":1},{"q":"Pourquoi le dépôt-vente donne-t-il accès aux pièces de marques haut de gamme ?","opts":["Les grossistes refusent de vendre ces marques","Ces pièces sont dans les placards des particuliers et ne circulent pas dans les filières grossistes","Ces marques sont trop chéres pour les lots","Vinted interdit la revente de ces marques via des lots"],"ok":1},{"q":"Combien d’articles minimum par dépôt pour que ce soit rentable ?","opts":["5 articles","10 articles","15 articles minimum","30 articles"],"ok":2}],"exercise":"<p><strong>Décide de ton modèle de départ :</strong></p><ol><li>As-tu 150-300&euro; disponibles à investir sans risque ?</li><li>As-tu 3 personnes minimum dans ton entourage avec des dressings à vider ?</li><li>Note ton modèle de départ : dépôt-vente / resell / les deux</li><li>Si dépôt-vente : liste immédiatement tes 3 premiers déposants potentiels</li><li>Si resell : définis ta niche (vintage, sportswear, femme casual, enfant...)</li></ol>"},{"id":"l22","title":"Le dépôt-vente — comment ça marche exactement","type":"Modèle dépôt","duree":"25 min","body":"<h2>Introduction</h2><p>Tu as choisi le dépôt-vente. Cette leçon te donne le fonctionnement complet, étape par étape, avec les détails que la plupart des guides n’expliquent pas.</p><hr><h2>Le processus en 5 étapes</h2><h3>Étape 1 — Qualifier et récupérer les vêtements</h3><p><strong>Critères d’acceptation :</strong></p><ul><li>Articles en très bon état ou neufs — pas de trous, taches, usure excessive</li><li>Marques acceptées : Zara, Mango, H&amp;M, Sandro, Maje, Nike, Levi’s...</li><li>Marques refusées : Shein, Primark, Gémo, Kiabi, marques distributeur</li><li>Minimum 15 articles par dépôt</li><li>Un seul genre par dépôt (femme, homme ou enfant)</li><li>70% des articles doivent correspondre à la saison actuelle</li></ul><h3>Étape 2 — Inventaire et prix</h3><p>Tu prends les photos dans DressKare, l’IA analyse et suggère catégorie, description et prix. Tu envoies les propositions au déposant qui valide depuis son espace.</p><h3>Étape 3 — Publication et visibilité</h3><p>Tu publies via l’extension Chrome DressKare. Tu republies régulièrement, tu baisses les prix après 14 jours sans vente (en accord avec le déposant).</p><h3>Étape 4 — Payer le déposant</h3><p>DressKare calcule automatiquement la répartition à chaque vente. Garde toujours une trace écrite des montants versés.</p><h3>Étape 5 — Gérer les invendus</h3><p>Après 2-3 mois : restitution au déposant ou don à une association partenaire.</p><hr><h2>Comment fixer tes commissions</h2><ul><li><strong>40/60</strong> (40% vendeur / 60% déposant) — le plus courant</li><li><strong>50/50</strong> — justifié si tu offres un service premium (récupération à domicile, mannequin IA)</li><li><strong>30/70</strong> — si le déposant a des pièces très haut de gamme</li></ul><hr><h2>Les erreurs classiques à éviter</h2><ul><li><strong>Accepter n’importe quoi par politesse.</strong> Tu passes 3h à photographier des articles qui ne se vendront jamais.</li><li><strong>Ne pas fixer les règles à l’avance.</strong> Durée, commission, invendus — tout doit être clair avant de commencer.</li><li><strong>Mélanger les stocks de plusieurs déposants.</strong> Avec DressKare, chaque article est lié à son déposant automatiquement.</li></ul><hr><h2>À retenir</h2><blockquote>Le dépôt-vente repose sur deux piliers : des critères d’acceptation stricts et des règles claires établies dès le départ. Sans ces deux piliers, le modèle devient chronophage et conflictuel.</blockquote>","quiz":[{"q":"Pourquoi est-il important de refuser les articles Shein, Primark ou Kiabi dans un dépôt ?","opts":["Ces marques sont interdites sur Vinted","Ces articles ne se vendent pas ou très peu sur Vinted — ils monopolisent ton temps pour aucun retour","DressKare ne reconnaît pas ces marques dans son IA","Les acheteurs Vinted n’aiment pas ces marques"],"ok":1},{"q":"Quelle commission vendeur est la plus courante dans un dépôt-vente standard ?","opts":["20% pour le vendeur / 80% pour le déposant","60% pour le vendeur / 40% pour le déposant","40% pour le vendeur / 60% pour le déposant","10% pour le vendeur / 90% pour le déposant"],"ok":2},{"q":"Qu’est-ce qui doit être défini AVANT de commencer un dépôt ?","opts":["Le nombre exact de ventes prévues","La durée du dépôt, la commission, la gestion des invendus et le délai de paiement","La liste complète des acheteurs potentiels","Le budget marketing pour promouvoir les articles"],"ok":1}],"exercise":"<p><strong>Prépare ton kit déposant :</strong></p><ol><li>Rédige ta grille de critères d’acceptation</li><li>Décide de ta commission de départ (40% ou 50% vendeur ?)</li><li>Rédige un message type à envoyer à un déposant potentiel en 5 lignes maximum</li><li>Prépare un accord simple : durée du dépôt, commission, gestion des invendus</li></ol>"},{"id":"l23","title":"Trouver des déposants — la méthode réseau","type":"Acquisition déposants","duree":"20 min","body":"<h2>Introduction</h2><p>Trouver ses premiers déposants ne bécessite ni pub payante ni Instagram avec 1000 abonnés. Ça commence par ton téléphone et les contacts que tu as déjà.</p><hr><h2>La vérité sur les déposants</h2><p>Presque tout le monde autour de toi a des vêtements à vendre. La Française moyenne possède 150 à 200 vêtements et n’en porte régulièrement que 20%.</p><p>Ton service résout exactement leurs problèmes. Tu n’as pas à convaincre des gens de vendre — ils veulent déjà vendre, ils cherchent juste quelqu’un pour le faire à leur place.</p><hr><h2>Les 5 cercles de sourcing réseau</h2><h3>Cercle 1 — Toi-même</h3><p>Commence par ton propre dressing. Du stock gratuit, risque zéro. Vise 15 à 30 pièces minimum pour commencer.</p><h3>Cercle 2 — La famille proche</h3><p>Parents, frères, sœurs, conjoint. Ils te font confiance et veulent t’aider à démarrer.</p><h3>Cercle 3 — Les amies proches</h3><p>Message direct, honnête : « Je me lance dans la vente de vêtements sur Vinted, j’aide les gens à vider leurs placards et je prends une commission. T’aurais pas des trucs à sortir ? »</p><h3>Cercle 4 — Le réseau élargi</h3><p>Camarades, anciens collègues, voisines, mamans de l’école. Via Instagram, Facebook ou WhatsApp.</p><h3>Cercle 5 — L’inconnu qualifié</h3><p>Post Instagram ‘recherche dépôt’, groupes Facebook locaux, bouche à oreille de tes déposantes actuelles.</p><hr><h2>Le message qui marche</h2><p><em>« Salut [prénom] ! Je me lance dans un projet sympa — j’aide les gens à vider leurs placards et vendre leurs vêtements sur Vinted sans avoir à s’en occuper elles-mêmes. Je gère tout : photos, mise en ligne, envoi des colis. Tu touches une partie des ventes, moi je garde ma commission. Si t’as des vêtements qui prennent la poussière (minimum 15 pièces), ça pourrait t’intéresser ? »</em></p><hr><h2>À retenir</h2><blockquote>Tes premiers déposants sont dans ton téléphone. Un message honnête envoyé à 10 contacts peut te donner 2 à 3 déposantes en 48h — largement suffisant pour démarrer.</blockquote>","quiz":[{"q":"Par quel cercle de réseau doit-on commencer pour trouver ses premiers déposants ?","opts":["Les groupes Facebook locaux — plus grande audience","Soi-même et la famille proche — confiance immédiate, zéro pression","Instagram — plus efficace pour toucher des inconnues","Les vide-greniers — beaucoup de vendeurs potentiels"],"ok":1},{"q":"Pourquoi presque tout le monde autour de toi est un déposant potentiel ?","opts":["Tout le monde veut gagner de l’argent","La Française moyenne possède 150-200 vêtements mais n’en porte que 20% — le reste attend dans les placards","Vinted a rendu la vente de vêtements très populaire","Les gens ont honte de leurs vieux vêtements"],"ok":1},{"q":"Quel signal d’alerte doit te faire refuser ou fortement qualifier un dépôt ?","opts":["La déposante habite loin de chez toi","Elle a principalement des articles Shein ou des vêtements achetés il y a plus de 10 ans chez H&M","Elle a moins de 30 articles","Elle ne connaît pas les prix Vinted"],"ok":1}],"exercise":"<p><strong>Lance ta première campagne déposants :</strong></p><ol><li>Ouvre tes contacts et identifie 10 personnes susceptibles d’avoir un dressing à vider</li><li>Rédige ton message personnalisé</li><li>Envoie-le à au moins 5 d’entre elles aujourd’hui — maintenant si possible</li><li>Pour celles qui répondent positivement, pose les questions de qualification</li><li>Fixe un rendez-vous avec la première déposante qualifiée</li></ol>"},{"id":"l24","title":"La soirée Tupperware version dépôt-vente","type":"Stratégie acquisition","duree":"20 min","body":"<h2>Introduction</h2><p>Il y a une méthode que les meilleures vendeuses pro utilisent pour trouver des déposants en masse — et personne n’en parle vraiment. Elle s’inspire directement du concept de la soirée Tupperware : réunir un groupe dans une ambiance conviviale, présenter un service, et repartir avec des commandes.</p><hr><h2>Pourquoi ça marche si bien</h2><p>Trouver des déposants un par un, c’est lent. Une soirée bien organisée peut te donner 4 à 6 déposantes confirmées en une seule soirée — soit 2 à 3 mois de stock potentiel en une fois.</p><ul><li>Quand une personne dit oui, les autres ont tendance à suivre</li><li>L’effet social réduit les hésitations</li><li>L’ambiance décontractée enlève la pression commerciale</li><li>Les participantes deviennent spontanément des ambassadrices</li></ul><hr><h2>Comment organiser ta première soirée</h2><p>Vise 6 à 10 invitées. Chez toi ou chez une amie. Ambiance décontractée : apéro, musique douce.</p><p><strong>Déroulé (2h) :</strong></p><ul><li>30 min — Accueil et apéro</li><li>20 min — Présentation : montre DressKare sur ton téléphone, partage des chiffres concrets (« j’ai vendu 380&euro; pour Marie, elle a touché 228&euro; »)</li><li>40 min — Tri en direct : tu évalues les pièces apportées, tu expliques ton raisonnement</li><li>30 min — Questions et prise de contact</li></ul><hr><h2>Le message d’invitation</h2><p><em>« Je t’invite à une petite soirée sympa chez moi [date/heure]. On va parler mode seconde main, je vais te montrer comment je gagne de l’argent avec les vêtements qui dorment dans les placards. Viens avec des vêtements que tu ne portes plus si tu en as. Apéro offert ! »</em></p><hr><h2>Résultats attendus</h2><p>Une soirée bien organisée avec 8 invitées donne typiquement : 2 à 3 dépôts confirmés, 50 à 150 articles potentiels, et plusieurs recommandations spontanées.</p><hr><h2>À retenir</h2><blockquote>Une soirée Tupperware bien organisée peut te donner 2 à 3 mois de stock en une seule soirée. C’est la méthode la plus efficace pour trouver des déposants rapidement, sans pub, sans Instagram.</blockquote>","quiz":[{"q":"Combien d’invitées est-il recommandé de réunir pour une soirée Tupperware dépôt-vente efficace ?","opts":["20 à 30 personnes pour maximiser les chances","2 à 3 personnes seulement","6 à 10 personnes — assez pour la dynamique de groupe, pas trop pour rester intime","Le nombre n’a pas d’importance"],"ok":2},{"q":"Quel est l’élément le plus convaincant à montrer pendant la présentation ?","opts":["Un catalogue de vêtements tendance","Des chiffres concrets de ventes réelles","Ton nombre d’abonnés Instagram","Les avis de tes acheteurs Vinted"],"ok":1},{"q":"Pourquoi la dynamique de groupe est-elle un avantage ?","opts":["Les gens sont plus généreux en groupe","Quand une personne dit oui, les autres ont tendance à suivre — l’effet social réduit les hésitations","Tu peux parler à plusieurs personnes en même temps","Les invitées apportent plus de vêtements"],"ok":1}],"exercise":"<p><strong>Planifie ta première soirée :</strong></p><ol><li>Choisis une date dans les 3 prochaines semaines</li><li>Liste 10 personnes à inviter (vise 6-8 présentes)</li><li>Rédige ton message d’invitation</li><li>Envoie les invitations aujourd’hui</li><li>Prépare 2-3 exemples de ventes récentes à montrer</li></ol>"},{"id":"l25","title":"Les boxes French Pick — sourcing achat-revente","type":"Sourcing achat","duree":"15 min","body":"<h2>Introduction</h2><p>Si tu veux compléter ton activité dépôt-vente avec du resell ciblé, les boxes de friperie sont une option à connaître. DressKare a négocié un partenariat avec French Pick qui change complètement l’équation.</p><hr><h2>Qu’est-ce que French Pick ?</h2><p>French Pick vend des boxes de vêtements de seconde main triés par catégorie et par grade de qualité. Contrairement aux grossistes classiques, tu sais exactement ce que tu commandes.</p><p><strong>Exemples de boxes :</strong> vestes cuir vintage, trench femme, chemises vintage, shorts été, blazers, manteaux.</p><p><strong>Grades :</strong> Grade A (très bon état), Grade B (bon état, quelques défauts), Vintage (à plus de 20 ans).</p><hr><h2>Le partenariat DressKare</h2><p><strong>1 box achetée = 1 box offerte</strong></p><p>Ton coût réel est divisé par deux. 80&euro; = 2 boxes, soit 50 pièces à 1,60&euro;/pièce. Prix de vente d’une veste cuir : 35-60&euro;. Marge nette : 30-50&euro; par pièce.</p><hr><h2>Comment intégrer dans DressKare</h2><ol><li>Tu crées un dépôt (type « achat-revente »)</li><li>Tu renseignes ton prix d’achat pour chaque article</li><li>L’IA suggère les prix de vente</li><li>Tu publies sur Vinted via l’extension Chrome</li><li>DressKare suit automatiquement ta marge par article et par box</li></ol><hr><h2>Conseils avant de commander</h2><ul><li>Commence petit — teste avec 1 box avant d’en commander 5</li><li>Vérifie les prix Vinted (filtre « vendus ») pour t’assurer qu’il y a une vraie demande</li><li>Combine avec le dépôt-vente — les boxes comblent les creux</li></ul><hr><h2>À retenir</h2><blockquote>Le partenariat French Pick &times; DressKare (1 box achetée = 1 box offerte) rend le sourcing achat-revente accessible et rentable. Commence par une box premium (cuir, vintage, trench) pour maximiser les marges dès le départ.</blockquote>","quiz":[{"q":"Quel est l’avantage du partenariat DressKare &times; French Pick ?","opts":["Livraison gratuite sur toutes les boxes","1 box achetée = 1 box offerte, ce qui divise le coût réel par deux","Accès à des boxes exclusives non disponibles au grand public","Remboursement garanti si la box est décevante"],"ok":1},{"q":"Quelles boxes French Pick offrent les meilleures marges par article ?","opts":["Les boxes t-shirts et basiques","Les boxes enfants","Les boxes premium : vestes cuir vintage, trench, blazers","Toutes les boxes ont les mêmes marges"],"ok":2},{"q":"Comment intègre-t-on une box French Pick dans DressKare ?","opts":["On ne peut pas — DressKare ne gère que le dépôt-vente","On la rentre comme un dépôt d’achat-revente avec le prix d’achat par article","On importe automatiquement via une API French Pick","On crée une boutique séparée dans DressKare"],"ok":1}],"exercise":"<p><strong>Avant de commander ta première box :</strong></p><ol><li>Choisis un type de box qui t’intéresse (ex : vestes cuir vintage)</li><li>Va sur Vinted, cherche ce type d’article, filtre sur « vendus »</li><li>Note les 10 dernières ventes : prix, état, rapidité de vente</li><li>Calcule ta marge potentielle avec la promo DressKare</li><li>Décide si ça vaut le coup — et si oui, commande</li></ol>"},{"id":"l26","title":"Évaluer une pièce — la règle du tiers","type":"Analyse rentabilité","duree":"15 min","body":"<h2>Introduction</h2><p>Acheter ou accepter une pièce sans méthode, c’est jouer à pile ou face. Cette leçon te donne une grille de décision simple que tu peux appliquer en 60 secondes à n’importe quel article.</p><hr><h2>La règle du tiers</h2><p><strong>Prix d’achat maximum = 1/3 du prix de vente visé</strong></p><ul><li>Tu vises 15&euro; &rarr; tu payes maximum 5&euro;</li><li>Tu vises 30&euro; &rarr; tu payes maximum 10&euro;</li><li>Tu vises 60&euro; &rarr; tu payes maximum 20&euro;</li></ul><p>Ce ratio te laisse de la marge pour les frais Vinted, le temps passé, et le risque que l’article mette du temps à se vendre.</p><hr><h2>Comment vérifier le prix de vente réaliste</h2><ol><li>Ouvre Vinted sur ton téléphone</li><li>Recherche l’article : marque + type (ex : « Zara blazer beige »)</li><li>Filtre sur <strong>« Vendus »</strong> — regarde les 5 à 10 dernières ventes</li></ol><p>Ce que tu vois dans les « vendus » est la vérité du marché. Pas ce que les gens espèrent vendre — ce qui a réellement été acheté.</p><hr><h2>La grille des 5 critères</h2><p>Un article qui ne coche pas au moins 4 critères sur 5 &rarr; tu passes.</p><ul><li><strong>Marque reconnue :</strong> Zara, Mango, H&amp;M, Nike, Levi’s, Sézane, Sandro, Maje... &check; / Shein, Primark, Gémo, Kiabi... &cross;</li><li><strong>Très bon état :</strong> pas de trou, pas de tache, coutures intactes</li><li><strong>Marge suffisante :</strong> la règle du tiers donne une marge nette acceptable</li><li><strong>Taille standard :</strong> S, M, L, 36, 38, 40 ont la meilleure rotation</li><li><strong>Rotation rapide :</strong> les « vendus » datent de moins de 30 jours</li></ul><hr><h2>Exemples réels</h2><p><strong>Blazer Zara, taille 38, très bon état, 3&euro; au vide-grenier</strong><br>Ventes Vinted 18-25&euro;, 5 critères sur 5 &rarr; <strong>Achète</strong></p><p><strong>Robe Shein, taille M, neuve, gratuit</strong><br>Ventes 3-5&euro;, 2 critères sur 5 &rarr; <strong>Refuse</strong> même si c’est gratuit</p><p><strong>Manteau Maje, taille 40, légère usure, 25&euro;</strong><br>Ventes 60-80&euro;, 4 critères sur 5 &rarr; <strong>Négocie à 15&euro; maximum</strong></p><hr><h2>À retenir</h2><blockquote>Règle du tiers + grille des 5 critères = ta protection contre les mauvais achats. Un article qui ne coche pas 4 critères sur 5, tu passes sans regret.</blockquote>","quiz":[{"q":"Avec la règle du tiers, quel est le prix d’achat maximum pour un article que tu espères vendre 45&euro; ?","opts":["20&euro;","15&euro;","22,50&euro;","10&euro;"],"ok":1},{"q":"Où doit-on vérifier le prix de vente réaliste d’un article avant de l’acheter ?","opts":["Sur le site de la marque","Sur Google Shopping","Dans les ventes récentes (filtre ‘vendus’) sur Vinted","En demandant à d’autres vendeurs Vinted"],"ok":2},{"q":"Un article Shein neuf est proposé gratuitement dans un dépôt. Que fais-tu ?","opts":["Tu l’acceptes — c’est gratuit donc pas de risque","Tu l’acceptes mais tu le vends très bon marché","Tu le refuses — marge nulle, rotation quasi inexistante, image négative","Tu le gardes pour toi"],"ok":2}],"exercise":"<p><strong>Applique la grille à 5 articles réels :</strong></p><ol><li>Prends 5 articles autour de toi (dressing, dépôt, ou articles envisagés)</li><li>Pour chacun, recherche les ventes récentes sur Vinted (filtre « vendus »)</li><li>Applique la règle du tiers : calcule le prix d’achat maximum</li><li>Coche les 5 critères pour chaque article8/li><li>Décide : achète / accepte / refuse / négocie8/li></ol>"}]},{"id":3,"emoji":"📸","title":"Publication & DressKare","short":"Publication","color":"#dcfce7","tc":"#15803d","lessons":[{"id":"l31","title":"Pourquoi publier souvent change tout","type":"Stratégie Vinted","duree":"15 min","body":"<h2>Introduction</h2><p>Sur Vinted, il y a une règle simple que les vendeur.se.s pro ont compris : <strong>la visibilité = l'activité</strong>. Ce n'est pas le prix qui fait vendre. C'est la régularité.</p><hr><h2>L'algorithme Vinted favorise l'activité</h2><p>Plus tu publies, plus tu apparais dans les résultats. Vinted booste les nouvelles annonces dans les premières heures. Une annonce publiée aujourd'hui a 10x plus de visibilité qu'une annonce de 2 semaines.</p><ul><li><strong>Nouveau vendeur actif</strong> → mis en avant automatiquement</li><li><strong>Vendeur inactif</strong> → invisibilisé progressivement</li><li><strong>Republication régulière</strong> → repart dans les résultats</li></ul><hr><h2>Le volume, c'est la base</h2><p>Un vendeur qui a 10 articles en ligne et un vendeur qui en a 100 n'ont pas les mêmes résultats — même à prix identique. C'est mathématique :</p><ul><li>10 articles → 1-2 ventes/semaine au mieux</li><li>50 articles → 5-10 ventes/semaine</li><li>100+ articles → activité stable et prévisible</li></ul><p><strong>L'objectif n'est pas d'avoir 10 bonnes annonces. C'est d'avoir 100 annonces correctes.</strong></p><hr><h2>La régularité bat la perfection</h2><p>Tu n'as pas besoin d'une annonce parfaite. Tu as besoin d'une annonce publiée. Beaucoup. Souvent. C'est ça le vrai levier.</p><blockquote>Publier 5 nouvelles annonces par semaine pendant 10 semaines = 50 articles. C'est ton seuil de rentabilité.</blockquote><hr><h2>Ce que ça change concrètement</h2><p>Quand tu publies régulièrement :</p><ul><li>Les acheteurs reviennent voir ton profil</li><li>Tu apparais dans les suggestions personnalisées</li><li>Tes articles sont republiés automatiquement si tu utilises un outil</li><li>Ton profil gagne en crédibilité (notation, historique)</li></ul>","quiz":[{"q":"Quel est le principal levier de visibilité sur Vinted ?","opts":["Mettre les prix les plus bas","Publier régulièrement de nouvelles annonces","Avoir 5 étoiles d'évaluation","Utiliser des mots-clés dans le titre"],"ok":1},{"q":"Combien d'articles en ligne faut-il viser pour avoir une activité stable ?","opts":["10 à 20 articles","30 à 40 articles","100 articles et plus","Il n'y a pas de seuil"],"ok":2},{"q":"Pourquoi la régularité est-elle plus importante que la perfection sur Vinted ?","opts":["Parce que les acheteurs ne lisent pas les descriptions","Parce que l'algorithme favorise l'activité récente et fréquente","Parce que les annonces parfaites font peur aux acheteurs","Parce que Vinted pénalise les annonces trop détaillées"],"ok":1}],"exercise":"<p class='exl'>🎯 EXERCICE TERRAIN</p><p class='ext'>Audit de ton rythme de publication</p><div class='exb'><p>Réponds honnêtement à ces 3 questions :</p><ol><li>Combien d'articles as-tu actuellement en ligne sur Vinted ?</li><li>Combien as-tu publié la semaine dernière ?</li><li>Combien republies-tu chaque semaine ?</li></ol><p><strong>Ton objectif :</strong> définir un rythme cible. Ex : 5 nouvelles annonces + 10 republications par semaine.</p><p>Note ce rythme. C'est ta baseline.</p></div>"},{"id":"l32","title":"Organisation du shooting batch","type":"Méthode pratique","duree":"20 min","body":"<h2>Introduction</h2><p>Le temps perdu dans la publication, ce n'est pas la rédaction. C'est le fait de <strong>traiter les articles un par un</strong>. Le shooting batch change tout : tu prends toutes tes photos en une session, tu traites tout en une session. Résultat : tu publies 10 articles en 1h au lieu de 10h.</p><hr><h2>Le principe du batch</h2><p>Tu regroupes toutes les opérations similaires. Plutôt que photo → description → publication pour chaque article, tu fais :</p><ol><li><strong>Session photo</strong> : tous les articles en une fois (30-45 min pour 15-20 articles)</li><li><strong>Session création</strong> : toutes les fiches d'un coup dans DressKare</li><li><strong>Session publication</strong> : tu publies tout en une fois</li></ol><p>C'est la même logique qu'une chaîne de production : chaque geste est optimisé.</p><hr><h2>Setup photo optimal (sans investissement)</h2><ul><li><strong>Fond :</strong> mur blanc ou drap clair — pas besoin de box photo</li><li><strong>Lumière :</strong> fenêtre naturelle = parfait. Évite le flash direct</li><li><strong>Téléphone :</strong> ton smartphone suffit. Nettoie l'objectif</li><li><strong>Photos à prendre par article :</strong> face, dos, étiquette, détail si nécessaire</li></ul><hr><h2>Les 4 types de photos qui vendent</h2><ul><li><strong>Photo face complète</strong> : article à plat ou sur cintre — obligatoire</li><li><strong>Photo dos</strong> : montre l'état réel — obligatoire</li><li><strong>Étiquette/marque</strong> : crédibilité — très recommandée</li><li><strong>Détail ou défaut</strong> : évite les litiges — obligatoire si défaut</li></ul><blockquote>Une photo claire vaut mieux qu'une belle photo floue. L'acheteur veut voir, pas admirer.</blockquote><hr><h2>Organiser tes fichiers</h2><p>Nomme tes photos avec un code simple : <code>article_01_face.jpg</code>, <code>article_01_dos.jpg</code>. Ainsi tu retrouves tout rapidement quand tu crées les fiches dans DressKare.</p>","quiz":[{"q":"Qu'est-ce que le 'shooting batch' ?","opts":["Prendre les photos avec un appareil professionnel","Regrouper toutes les photos en une seule session pour gagner du temps","Faire appel à un photographe externe","Utiliser un fond vert pour les photos"],"ok":1},{"q":"Combien de photos minimum faut-il pour une annonce qui vend bien ?","opts":["1 photo face suffit","Face + dos + étiquette au minimum","10 photos sous tous les angles","Aucune photo n'est nécessaire si la description est bonne"],"ok":1},{"q":"Quel est le meilleur éclairage pour photographier des vêtements sans investissement ?","opts":["Flash intégré au téléphone","Lumière naturelle d'une fenêtre","Ampoule LED colorée","Pas d'éclairage, le flash automatique suffit"],"ok":1}],"exercise":"<p class='exl'>🎯 EXERCICE TERRAIN</p><p class='ext'>Ton premier shooting batch</p><div class='exb'><p>Organise ta prochaine session photo en batch :</p><ol><li>Regroupe 10 à 15 articles à photographier</li><li>Prépare ton espace (fond, lumière naturelle)</li><li>Photographie chaque article : face, dos, étiquette</li><li>Classe les photos par article dans un dossier</li></ol><p><strong>Objectif :</strong> 10 articles photographiés en moins de 45 minutes.</p><p>Chronométre-toi. Note le temps. Tu vas t'améliorer à chaque session.</p></div>"},{"id":"l33","title":"Publier avec DressKare — la méthode complète","type":"Démonstration outil","duree":"25 min","body":"<h2>Introduction</h2><p>Faire une annonce à la main sur Vinted prend en moyenne 8-12 minutes par article. Avec DressKare, tu descends à 2-3 minutes. Sur 50 articles, c'est 4-5h gagnées. Par semaine. C'est ça le vrai levier.</p><hr><h2>Comment DressKare accélère la publication</h2><p>DressKare automatise les étapes répétitives :</p><ul><li><strong>Analyse IA des photos</strong> : tu importes ta photo, l'IA détecte la marque, la catégorie, l'état</li><li><strong>Génération automatique</strong> : titre, description et mots-clés générés instantanément</li><li><strong>Duplication</strong> : un article similaire ? Duplique et ajuste, ne recrée pas</li><li><strong>Publication directe</strong> : depuis DressKare vers Vinted, sans changer d'app</li></ul><hr><h2>Le workflow en 5 étapes</h2><ol><li><strong>Import photo</strong> → prends la photo ou importe depuis ta galerie</li><li><strong>Analyse IA</strong> → DressKare remplit automatiquement marque, taille, état, catégorie</li><li><strong>Vérification</strong> → tu vérifies et ajustes si nécessaire (30 secondes)</li><li><strong>Prix</strong> → DressKare suggère un prix basé sur le marché actuel Vinted</li><li><strong>Publication</strong> → un clic, l'annonce est en ligne</li></ol><hr><h2>Fonctionnalités clés pour le volume</h2><ul><li><strong>Republication automatique</strong> : tes annonces sont republiées selon ton calendrier sans que tu le fasses à la main</li><li><strong>Gestion des déposants</strong> : chaque déposant a son espace, les commissions sont calculées automatiquement</li><li><strong>Tableau de bord</strong> : tu vois tout — stock, ventes, revenus — en un coup d'œil</li><li><strong>Baisse de prix automatique</strong> : règle une baisse automatique après X jours sans vente</li></ul><blockquote>DressKare ne remplace pas ton jugement. Il supprime les tâches répétitives pour que tu puisses te concentrer sur ce qui compte : trouver de belles pièces et développer ton réseau.</blockquote><hr><h2>Comparaison avant/après</h2><ul><li><strong>Sans DressKare :</strong> 50 articles = 7-10h de travail / semaine</li><li><strong>Avec DressKare :</strong> 50 articles = 2-3h de travail / semaine</li><li><strong>Gain :</strong> 5-7h par semaine que tu réinvestis dans le sourcing ou la vie</li></ul>","quiz":[{"q":"Quelle fonctionnalité de DressKare permet de gagner le plus de temps sur chaque annonce ?","opts":["Le filtre photo automatique","L'analyse IA qui remplit automatiquement les informations de l'article","La traduction automatique en plusieurs langues","L'envoi automatique des colis"],"ok":1},{"q":"Qu'est-ce que la 'republication automatique' dans DressKare ?","opts":["Publier la même annonce sur plusieurs plateformes","Remettre automatiquement tes annonces en tête de liste selon un calendrier","Dupliquer une annonce pour la vendre deux fois","Envoyer une newsletter à tes acheteurs"],"ok":1},{"q":"Quel est le gain de temps estimé en utilisant DressKare pour gérer 50 articles ?","opts":["30 minutes par semaine","1 heure par semaine","5 à 7 heures par semaine","DressKare ne fait pas gagner de temps"],"ok":2}],"exercise":"<p class='exl'>🎯 EXERCICE TERRAIN</p><p class='ext'>Active DressKare et publie 5 annonces</p><div class='exb'><p>C'est le moment de passer à l'action :</p><ol><li>Crée ton compte DressKare si ce n'est pas déjà fait</li><li>Importe les photos de 5 articles (ceux que tu as photographiés dans l'exercice précédent)</li><li>Laisse l'IA analyser et remplir les informations</li><li>Vérifie et ajuste chaque fiche (30 secondes par article)</li><li>Publie les 5 articles sur Vinted depuis DressKare</li></ol><p><strong>Chronomètre-toi.</strong> Compare avec le temps que ça te prenait avant.</p></div>"}]},{"id":4,"emoji":"📈","title":"Scaler son activité","short":"Scaler","color":"#fef9c3","tc":"#854d0e","lessons":[{"id":"l41","title":"Le seuil critique — combien d'articles pour être rentable","type":"Stratégie business","duree":"20 min","body":"<h2>Introduction</h2><p>Il y a un cap en dessous duquel tu travailles pour rien et au-dessus duquel tu construis une vraie activité. Ce cap, c'est le <strong>seuil de rentabilité</strong>. Et tu dois le connaître avant de planifier quoi que ce soit.</p><hr><h2>Le calcul simple</h2><p>Pour atteindre 500€/mois de revenus nets avec un dépôt-vente à 30% de commission :</p><ul><li>Prix de vente moyen d'un article : 20€</li><li>Ta commission (30%) : 6€ par article vendu</li><li>Nombre d'articles à vendre par mois : 500/6 = <strong>84 articles vendus</strong></li><li>Taux de vente moyen sur Vinted : ~10-15% par mois</li><li>Stock nécessaire : 84/0,12 = <strong>700 articles en ligne</strong></li></ul><blockquote>C'est pour ça que le volume est non négociable. Pas 20 articles. Pas 50. Des centaines.</blockquote><hr><h2>Les 3 paliers de revenus</h2><ul><li><strong>Palier 1 — complément de revenus (200-400€/mois)</strong> : 150 à 300 articles en ligne, 2-3 dépôts actifs</li><li><strong>Palier 2 — revenu significatif (500-800€/mois)</strong> : 400 à 600 articles en ligne, 5-8 dépôts actifs</li><li><strong>Palier 3 — activité principale (1000€+/mois)</strong> : 800+ articles en ligne, 10+ dépôts actifs, DressKare indispensable</li></ul><hr><h2>La bonne nouvelle</h2><p>Atteindre 150 articles en ligne, c'est accessible en 6-8 semaines avec 3-4 dépôts. Ce n'est pas un objectif lointain. C'est le programme des 8 prochaines semaines.</p><hr><h2>Ce que DressKare change à ce stade</h2><p>Sans outil, gérer 200 articles prend 15-20h par semaine. Avec DressKare, c'est 4-5h. Cette différence de temps, c'est soit du burnout, soit de la croissance. Tu choisis.</p>","quiz":[{"q":"Pourquoi le volume d'articles est-il non négociable pour une activité rentable ?","opts":["Parce que Vinted impose un minimum d'articles","Parce que le taux de vente moyen est de 10-15% par mois, il faut donc beaucoup de stock pour vendre suffisamment","Parce que plus on a d'articles, plus on obtient l'insigne Pro","Parce que les acheteurs ne font confiance qu'aux vendeurs avec beaucoup d'articles"],"ok":1},{"q":"Combien d'articles faut-il approximativement pour viser 200-400€ nets par mois en dépôt-vente ?","opts":["20 à 30 articles","50 à 80 articles","150 à 300 articles","Plus de 1000 articles"],"ok":2},{"q":"Quel est l'impact de DressKare sur le temps de gestion à 200 articles ?","opts":["Aucun impact, c'est du temps de gestion fixe","Réduction de 15-20h à 4-5h de travail par semaine","Réduction de 1h par semaine seulement","DressKare est inutile en dessous de 500 articles"],"ok":1}],"exercise":"<p class='exl'>🎯 EXERCICE TERRAIN</p><p class='ext'>Calcule ton seuil de rentabilité personnel</p><div class='exb'><p>Définis ton objectif de revenu mensuel net et calcule ce qu'il faut :</p><ol><li>Mon objectif mensuel net : ___€</li><li>Mon taux de commission moyen : ___% (ex: 30%)</li><li>Prix de vente moyen de mes articles : ___€</li><li>Ma commission par vente : ___€</li><li>Articles à vendre par mois : objectif / commission = ___</li><li>Stock nécessaire (taux de vente 12%) : articles à vendre / 0,12 = ___</li></ol><p><strong>Ce chiffre final, c'est ton objectif de stock.</strong> Note-le. C'est vers ça que tu travailles.</p></div>"},{"id":"l42","title":"Routine vendeur.se pro — piloter son activité","type":"Organisation","duree":"20 min","body":"<h2>Introduction</h2><p>Ce qui distingue un vendeur amateur d'un vendeur pro, ce n'est pas le talent. C'est la <strong>routine</strong>. Une activité sans routine, c'est une activité qui dépend de ta motivation du moment. Et la motivation, ça fluctue. La routine, non.</p><hr><h2>La routine hebdomadaire type</h2><p>Voici la semaine d'un.e vendeur.se pro qui gère 200 articles :</p><ul><li><strong>Lundi — Collecte</strong> : récupérer les nouveaux dépôts, trier, évaluer</li><li><strong>Mardi — Shooting</strong> : session photo batch de tous les nouveaux articles</li><li><strong>Mercredi — Publication</strong> : créer et publier les fiches dans DressKare</li><li><strong>Jeudi — Suivi</strong> : répondre aux messages, gérer les ventes, envoyer les colis</li><li><strong>Vendredi — Optimisation</strong> : baisser les prix sur les articles qui stagnent, republier</li><li><strong>Weekend — Prospection</strong> : contacter de nouveaux déposants potentiels</li></ul><hr><h2>Les indicateurs à suivre chaque semaine</h2><ul><li><strong>Articles en ligne</strong> : est-ce que ton stock grandit ?</li><li><strong>Ventes de la semaine</strong> : combien d'articles vendus ?</li><li><strong>Revenu de la semaine</strong> : es-tu dans ta trajectoire ?</li><li><strong>Nouveaux dépôts</strong> : combien de nouvelles pièces rentrées ?</li><li><strong>Taux de vente</strong> : articles vendus / articles en ligne × 100</li></ul><blockquote>Ce que tu ne mesures pas, tu ne peux pas l'améliorer. Suis tes chiffres chaque semaine, même 10 minutes.</blockquote><hr><h2>DressKare comme centre de contrôle</h2><p>Dans DressKare, ton tableau de bord affiche en temps réel :</p><ul><li>Ton stock total par déposant</li><li>Les ventes récentes et les commissions dues</li><li>Les articles qui n'ont pas bougé depuis 14 jours (à republier ou baisser)</li><li>Ton revenu du mois en cours</li></ul><p>Tu n'as plus à tenir de tableur Excel. Tout est centralisé.</p><hr><h2>La règle du vendredi</h2><p>Chaque vendredi : passe 30 minutes à regarder quels articles n'ont pas eu de vues depuis 14 jours. Baisse le prix de 10-15% ou republier. Un article qui ne bouge pas, ça occupe de la place sans générer de revenu.</p>","quiz":[{"q":"Pourquoi une routine est-elle plus efficace que la motivation pour développer une activité ?","opts":["La routine est légalement obligatoire pour les vendeurs pro","La motivation fluctue alors que la routine est stable et prévisible","La routine permet d'éviter les impôts","La motivation n'existe pas dans la vente de vêtements"],"ok":1},{"q":"Quel indicateur faut-il surveiller en priorité chaque semaine ?","opts":["Le nombre de followers Instagram","Le nombre d'articles en ligne, les ventes et le revenu hebdomadaire","Le nombre de messages reçus","Le classement dans les résultats de recherche"],"ok":1},{"q":"Que faut-il faire avec les articles qui n'ont eu aucune vue depuis 14 jours ?","opts":["Les garder sans toucher, ça finit par se vendre","Les retirer de la vente définitivement","Baisser le prix de 10-15% ou republier pour regagner en visibilité","Contacter manuellement chaque acheteur potentiel"],"ok":2}],"exercise":"<p class='exl'>🎯 EXERCICE TERRAIN</p><p class='ext'>Crée ta routine hebdomadaire</p><div class='exb'><p>Adapte la routine type à ta vie :</p><ol><li>Quel jour fais-tu ta collecte/dépôts ? ___</li><li>Quel jour fais-tu ton shooting ? ___</li><li>Quel jour publies-tu ? ___</li><li>Quand gères-tu les messages et envois ? ___</li><li>Quel jour optimises-tu les prix ? ___</li></ol><p>Mets ces créneaux dans ton agenda maintenant. Bloque-les comme des rendez-vous professionnels.</p><p><strong>Bonus :</strong> active le tableau de bord DressKare et note tes 3 chiffres clés de cette semaine.</p></div>"}]},{"id":5,"emoji":"⚖️","title":"Statut & Légal","short":"Légal","color":"#fce7f3","tc":"#9d174d","lessons":[{"id":"l51","title":"Micro-entrepreneur — tout ce qu'il faut savoir","type":"Administratif","duree":"25 min","body":"<h2>Introduction</h2><p>Le frein administratif, c'est ce qui bloque la plupart des vendeur.se.s potentiel.le.s. Mais la réalité est simple : créer une micro-entreprise en France prend <strong>15 minutes en ligne</strong> et c'est gratuit. Tu n'as pas besoin d'un comptable pour commencer.</p><hr><h2>Quand faut-il se déclarer ?</h2><p>Légalement, tu dois te déclarer dès que tu réalises des ventes régulières avec <strong>intention de profit</strong>. Concrètement :</p><ul><li>Ventes occasionnelles de tes propres vêtements : pas d'obligation</li><li>Activité régulière de revente ou dépôt-vente : micro-entreprise obligatoire</li><li>Seuil de vigilance : dès que tu dépasses 2000-3000€ de ventes/an, déclare-toi</li></ul><blockquote>Ne pas se déclarer, c'est un risque réel. Les plateformes transmettent les données à l'administration fiscale. Mieux vaut régulariser tôt.</blockquote><hr><h2>Le statut micro-entrepreneur — les bases</h2><ul><li><strong>Création :</strong> en ligne sur autoentrepreneur.urssaf.fr (gratuit, 15 min)</li><li><strong>Cotisations :</strong> tu ne paies que si tu gagnes. Pas de CA = 0€ de charges</li><li><strong>Taux :</strong> environ 22% du chiffre d'affaires pour le commerce</li><li><strong>Plafond :</strong> 77 700€ de CA/an en 2024 (largement suffisant pour démarrer)</li><li><strong>Facturation :</strong> pas de TVA à facturer sous le plafond (option franchise en base)</li></ul><hr><h2>Le compte Vinted Pro</h2><p>Une fois ton numéro SIRET obtenu (recu par courrier dans les 2 semaines), tu peux passer ton compte Vinted en mode Pro. Avantages :</p><ul><li>Accès aux statistiques de vente avancées</li><li>Badge professionnel visible sur ton profil</li><li>Obligations légales respectées (mentions légales automatiques)</li><li>Possibilité de facturer les acheteurs professionnels</li></ul><hr><h2>Ce que DressKare facilite</h2><p>DressKare génère automatiquement les rapports de ventes dont tu as besoin pour ta déclaration trimestrielle. Pas besoin de tenir un tableur : tu exportes, tu déclares.</p>","quiz":[{"q":"À partir de quel moment faut-il se déclarer en micro-entreprise pour la vente de vêtements ?","opts":["Seulement quand tu dépasses 10 000€ de ventes","Dès que tu réalises des ventes régulières avec intention de profit","Jamais, Vinted est une plateforme entre particuliers","Uniquement si tu emploies d'autres personnes"],"ok":1},{"q":"Quel est l'avantage principal du statut micro-entrepreneur pour un vendeur qui démarre ?","opts":["Tu ne paies aucune taxe quelle que soit ton activité","Tu ne paies des cotisations que si tu génères du chiffre d'affaires","Tu peux employer 5 salariés gratuitement","Tu bénéficies d'une TVA réduite à5%"],"ok":1},{"q":"Combien de temps prend la création d'une micro-entreprise en ligne ?","opts":["3 à 6 mois avec un expert-comptable","1 mois avec le délai de traitement","15 minutes en ligne sur autoentrepreneur.urssaf.fr","Impossible à faire soi-même"],"ok":2}],"exercise":"<p class='exl'>🎯 EXERCICE TERRAIN</p><p class='ext'>Lance tes démarches administratives</p><div class='exb'><p>Checklist administrative complète :</p><ol><li>Va Rur <strong>autoentrepreneur.urssaf.fr</strong> et crée ton compte</li><li>Remplis le formulaire de création (activité : commerce de détail de vêtements)</li><li>Note ton numéro SIRET dès réception (2 semaines par courrier)</li><li>Passe ton compte Vinted en mode Pro avec ton SIRET</li><li>Configure DressKare avec tes infos professionnelles</li></ol><p><strong>Délai total :</strong> 15 minutes de démarches + 2 semaines d'attente du SIRET. Tu peux vendre pendant ce délai.</p></div>"}]},{"id":6,"emoji":"📱","title":"Stratégie Instagram","short":"Instagram","color":"#ede9fe","tc":"#6d28d9","lessons":[{"id":"l61","title":"Instagram comme canal d'acquisition de déposants","type":"Marketing",""duree":"20 min","body":"<h2>Introduction</h2><p>Instagram n'est pas là pour faire joli. Pour un.e vendeur.se en dépôt-vente, c'est un <strong>canal d'acquisition de déposants</strong>. Chaque personne qui te suit est un potentiel déposant futur. C'est cette vision qui change tout.</p><hr><h2>La stratégie simple en 3 piliers</h2><ol><li><strong>Montrer le processus</strong> : photos du tri, du shooting, des colis envoyés. Les gens veulent voir comment ça fonctionne.</li><li><strong>Montrer les résultats</strong> : capture d'écran des ventes, témoignages de déposants satisfaits, revenus générés (avec leur accord)</li><li><strong>Appel à l'action clair</strong> : \"Tu as des vêtements à vendre ? Envoie-moi un message\"</li></ol><hr><h2>Le contenu qui convertit</h2><ul><li><strong>Before/After</strong> : article recu vs article vendu — montrer la transformation et la valeur cråée</li><li><strong>Compte-rendu de dépôt</strong> : \"J'ai récupépé 30 articles aujourd'hui chez Sophie, voilà ce �u'on va publier\"</li><li><strong>Résultat de vente</strong> : \"Ce manteau Sandro récupépé en dépôt vient d'être vendu 85€. Sophie reçoit 60€.\"</li><li><strong>FAQ en stories</strong> : répondre aux questions fréquentes sur le dépôt-vente</li></ul><blockquote>Tu n'as pas besoin de 10 000 abonnés. Tu as besoin de 100 personnes qui te font confiance dans ta ville.</blockquote><hr><h2>Le profil à créer</h2><ul><li><strong>Nom :</strong> ton prénom + \"revente vêtements [ta ville]\" ou \"dépôt-vente [ta ville]\"</li><li><strong>Bio :</strong> \"Je vends vos vêtements sur Vinted pour vous. 0 effort, vous recevez votre part.\"</li><li><strong>Lien :</strong> WhatsApp Business ou formulaire de contact simple</li><li><strong>Rythme :</strong> 3-4 posts par semaine minimum</li></ul><hr><h2>La règle des 80/20</h2><p>80% de ton contenu montre, enseigne ou divertit. 20% seulement vend ou prospecte directement. Les gens suivent pour apprendre et être inspirés, pas pour recevoir des pubs.</p>","quiz":[{"q":"Quel est le principal objectif d'Instagram pour un.e vendeur.se en dépôt-vente ?","opts":["Vendre directement des vêtements sur Instagram","Acquérir de nouveaux déposants en montrant son activité","Avoir le plus d'abonnés possible dans sa région","Faire de la publicité payante pour Vinted"],"ok":1},{"q":"Quel type de contenu convertit le mieux pour attirer des déposants ?","opts":["Les photos de mode professionnelles en studio","Le before/after et les résultats concrets de ventes réelles","Les memes et le contenu viral","Les stories de sa vie personnelle"],"ok":1},{"q":"Quelle est la règle des 80/20 appliquée au contenu Instagram ?","opts":["80% de contenu payant, 20% de contenu gratuit","80% de contenu qui montre/enseigne/divertit, 20% de contenu commercial","80% de stories, 20% de posts","80% de photos, 20% de vidéos"],"ok":1}],"exercise":"<p class='exl'>🎯 EXERCICE TERRAIN</p><p class='ext'>Crée ou optimise ton profil Instagram</p><div class='exb'><p>Checklist profil Instagram déposants :</p><ol><li>Photo de profil : ton visage (pas un logo) — crée la confiance</li><li>Nom : prénom + \"revente vêtements\" + ta ville</li><li>Bio : explique en 3 lignes ce que tu fais pour les déposants</li><li>Lien : WhatsApp Business ou formulaire de contact</li><li>Poste ton premier contenu : photo d'un dépôt en cours ou d'une vente récente</li></ol><p><strong>Défi :</strong> publie 3 posts cette semaine en utilisant la règle des 80/20.</p></div>"}]},{"id":7,"emoji":"🛒","title":"Boutique Shopify","short":"Shopify","color":"#d1fae5","tc":"#065f46","lessons":[{"id":"l71","title":"Shopify — pour qui et pourquoi ?","type":"Stratégie avancée","duree":"20 min","body":"<h2>Introduction</h2><p>Shopify n'est pas pour tout le monde. Et surtout, ce n'est pas pour commencer. C'est une étape de <strong>structuration avancée</strong>, une fois que ton activité Vinted tourne bien et que tu veux diversifier tes canaux de vente.</p><hr><h2>Quand envisager Shopify ?</h2><ul><li>Tu as plus de 200 articles en ligne sur Vinted</li><li>Tu génères déjà 500€+/mois de revenus réguliers</li><li>Tu as une niche ou une identité visuelle claire (ex: marques premium, vintage 90s, sport...)</li><li>Tu veux vendre en dehors de Vinted sans passer par leurs frais</li></ul><blockquote>Si tu n'es pas encore à ce stade, concentre-toi sur Vinted d'abord. Shopify sans trafic et sans notoriété, c'est une boutique vide.</blockquote><hr><h2>Les avantages de Shopify vs Vinted</h2><ul><li><strong>Zéro commission</strong> sur les ventes (vs 3-5% sur Vinted)</li><li><strong>Base client à toi</strong> : tu connais tes acheteurs, tu peux les relancer</li><li><strong>Image de marque</strong> : ton nom, tes couleurs, ton univers</li><li><strong>Prix libre</strong> : pas de contrainte de format Vinted</li></ul><hr><h2>Les contraintes réelles</h2><ul><li><strong>Abonnement Shopify :</strong> à partir de 27€/mois</li><li><strong>Trafic à générer vous-même :</strong> personne ne trouve ta boutique sans SEO, Instagram ou pub</li><li><strong>Gestion des paiements et livraisons :</strong> plus complexe qu'avec Vinted</li><li><strong>Temps de setup :</strong> 1-2 semaines pour une boutique propre</li></ul><hr><h2>Le modèle hybride (recommandé)</h2><p>La stratégie la plus efficace : <strong>Vinted pour le volume et la découverte, Shopify pour les clients fidèles et les pièces premium</strong>. Les deux se complètent. Un acheteur Vinted satisfait peut devenir client direct sur ta boutique Shopify.</p><hr><h2>DressKare et Shopify</h2><p>DressKare permet de synchroniser ton stock entre Vinted et Shopify. Une pièce vendue sur l'un est automatiquement retirée de l'autre. Tu n'as pas à gérer le stock deux fois.</p>","quiz":[{"q":"À quel stade de son activité faut-il envisager d'ouvrir une boutique Shopify ?","opts":["Dès le premier article mis en vente","Uniquement si on veut vendre à l'international","Quand on a une activité Vinted déjà solide (200+ articles, 500€+/mois)","Shopify est inutile pour la revente de vêtements"],"ok":2},{"q":"Quel est le principal avantage financier de Shopify par rapport à Vinted ?","opts":["Shopify est totalement gratuit","Shopify ne prend aucune commission sur les ventes","Shopify offre des remises sur les frais de port","Shopify paye les vendeurs en avance"],"ok":1},{"q":"Quel est le modèle hybride recommandé ?","opts":["Shopify pour tout, abandonner Vinted","Vinted pour le volume et la découverte, Shopify pour les clients fidèles et pièces premium","Shopify pour les pièces à moins de 20€, Vinted pour le reste","Alterner un mois sur chaque plateforme"],"ok":1}],"exercise":"<p class='exl'>🎯 EXERCICE TERRAIN</p><p class='ext'>Évalue ta maturité pour Shopify</p><div class='exb'><p>Réponds honnêtement :</p><ol><li>Combien d'articles as-tu en ligne sur Vinted actuellement ? ___</li><li>Quel est ton revenu mensuel moyen sur les 3 derniers mois ? ___€</li><li>As-tu une niche ou identité de marque claire ? Oui / Non</li><li>As-tu une audience Instagram de 500+ abonnés engagés ? Oui / Non</li></ol><p><strong>Score :</strong><br>0-1 oui → Continue sur Vinted, Shopify n'est pas encore pertinent<br>2-3 oui → Tu peux commencer à explorer Shopify<br>4 oui → Lance-toi sur Shopify maintenant</p></div>"}]},{"id":8,"emoji":"🚀","title":"Passer à l'échelle","short":"Scale","color"::"#fee2e2","tc":"#991b1b","lessons":[{"id":"l81","title":"De vendeur.se solo à micro-entrepreneur organisé.e","type":"Vision long terme","duree":"20 min","body":"<h2>Introduction</h2><p>Tu es arrivé.e au bout de la formation. Tu as les bases. Tu sais sourcer, publier, organiser, légaliser. Maintenant la question est : <strong>jusqu'où tu veux aller ?</strong></p><hr><h2>Les 3 trajectoires possibles</h2><ol><li><strong>Complément de revenus stable (200-500€/mois)</strong> : 3-5 dépôts actifs, 100-200 articles en ligne, 5-8h de travail par semaine. Parfaitement gérable en solo avec DressKare.</li><li><strong>Activité principale (800-1500€/mois)</strong> : 8-15 dépôts actifs, 300-500 articles en ligne, 15-20h de travail par semaine. À ce stade, DressKare devient indispensable.</li><li><strong>Business structuré (2000€+/mois)</strong> : 20+ dépôts, 600+ articles, micro-équipe possible (stagiaire, assistant). Nécessite une organisation solide et possiblement plusieurs vendeurs affiliés.</li></ol><hr><h2>Les leviers de croissance</h2><ul><li><strong>Plus de déposants :</strong> c'est le levier n°1. Chaque nouveau déposant = nouveau stock sans investissement</li><li><strong>Meilleure sélection :</strong> accepter uniquement les pièces qui se vendent vite. Affiner ta sélection augmente ton taux de vente</li><li><strong>Spécialisation :</strong> se concentrer sur une niche (marques premium, enfants, sport) = meilleure visibilité, meilleurs prix</li><li><strong>Réseautage local :</strong> associations, conciergeries, boutiques de quartier — tout le monde a des vêtements à valoriser</li></ul><hr><h2>Ce que DressKare rend possible à grande échelle</h2><p>Sans outil, gérer 20 déposants et 600 articles est impossible seul.e. Avec DressKare :</p><ul><li>Chaque déposant voit son espace en temps réel</li><li>Les commissions sont calculées automatiquement à chaque vente</li><li>Les paiements déposants sont tracés et documentés</li><li>Tu peux déléguer la publication à quelqu'un sans risquer les erreurs de commission</li></ul><blockquote>Le vrai scale, ce n'est pas travailler plus. C'est avoir un système qui travaille pendant que tu te concentres sur la relation et la croissance.</blockquote><hr><h2>Ta prochaine action</h2><p>Tu as maintenant toutes les clés. La formation est terminée. Mais le travail commence maintenant. Définis ta trajectoire, fixe ton objectif à 3 mois, et tiens ta routine. Le reste suit.</p>","quiz":[{"q":"Quel est le levier de croissance n°1 pour scaler une activité de dépôt-vente ?","opts":["Investir dans de la publicité payante","Baisser systématiquement tous les prix","Trouver plus de déposants actifs","Ouvrir une boutique physique"],"ok":2},{"q":"À partir de quel stade DressKare devient-il indispensable ?","opts":["Dès le premier article","À partir de 5 articles en ligne","Quand on gère 8-15 dépôts actifs et 300-500 articles","DressKare n'est jamais indispensable"],"ok":2},{"q":"Qu'est-ce que la spécialisation apporte à une activité de revente ?","opts":["Une obligation légale pour les micro-entrepreneurs","Une meilleure visibilité et de meilleurs prix sur une niche ciblée","La possibilité de ne travailler qu'1h par semaine","L'accès à des dépôts exclusifs de grandes marques"],"ok":1}],"exercise":"<p class='exl'>🎯 EXERCICE FINAL</p><p class='ext'>Ton plan 90 jours</p><div class='exb'><p>Définis ta trajectoire pour les 3 prochains mois :</p><ol><li><strong>Ma trajectoire choisie :</strong> complément de revenus / activité principale / business (entoure)</li><li><strong>Mon objectif de revenu à 90 jours :</strong> ___€/mois</li><li><strong>Mon objectif de stock à 90 jours :</strong> ___ articles en ligne</li><li><strong>Mon objectif de dépôts actifs :</strong> ___ déposants</li><li><strong>Mon rythme hebdomadaire :</strong> ___ heures/semaine</li></ol><p><strong>Maintenant :</strong> note la date d'aujourd'hui et reviens dans 90 jours mesurer tes progrès. C'est là que tu verras si la formation a changé quelque chose.</p><p>Bonne route. 🚀</p></div>"}]}];
const TOTAL = DATA.reduce((a,b)=>a+b.lessons.length,0);

// Clear old state on version change
const VER = 'dk10';
let S = {user:'',view:'home',cur:null,done:{},ans:{},sub:{}};
function sv(){try{localStorage.setItem(VER,JSON.stringify(S));}catch(e){}}
function ld(){try{const d=localStorage.getItem(VER);if(d)Object.assign(S,JSON.parse(d));}catch(e){}}
ld();

const pct=()=>TOTAL?Math.round(Object.keys(S.done).length/TOTAL*100):0;
function unlocked(bi,li){return true;}

// ── AUTH ──
document.getElementById('btnlogin').onclick=doLogin;
document.getElementById('iname').onkeydown=e=>{if(e.key==='Enter')doLogin();};
document.getElementById('btnlo').onclick=doLogout;

function doLogin(){
  const n=document.getElementById('iname').value.trim();
  if(!n){document.getElementById('iname').focus();return;}
  S.user=n;sv();
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('visible');
  boot();
}
function doLogout(){
  S.user='';sv();
  document.getElementById('login').style.display='flex';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('iname').value='';
}

// Auto-login if returning user
if(S.user){
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('visible');
  boot();
}

function boot(){
  document.getElementById('sbu').textContent='Bonjour '+S.user+' \u{1F44B}';
  renderSB();
  if(S.view==='lesson'&&S.cur)goLesson(S.cur.bi,S.cur.lid);
  else showHome();
}

// ── SIDEBAR ──
function renderSB(){
  document.getElementById('spct').textContent=pct()+'%';
  document.getElementById('pfil').style.width=pct()+'%';
  let h=`<div class="nhome ${S.view==='home'?'act':''}" onclick="showHome()">\u{1F3E0} Accueil</div>`;
  DATA.forEach((bloc,bi)=>{
    h+=`<div class="nbl">${bloc.emoji} ${bloc.short}</div>`;
    if(!bloc.lessons.length){
      h+=`<div class="nl lk"><div class="nd" style="background:#f0f0ee;color:#b0aca6;font-size:8px">\u2736</div><div class="nt" style="color:#b0aca6;font-size:10.5px">\u00c0 venir</div></div>`;
      return;
    }
    bloc.lessons.forEach((l,li)=>{
      const uk=unlocked(bi,li),dn=!!S.done[l.id],act=S.cur?.lid===l.id;
      const [bg,tc]=dn?['#dcfce7','#15803d']:act?['#dbeafe','#2952e3']:!uk?['#f0f0ee','#b0aca6']:['#f0f0ee','#6b6762'];
      h+=`<div class="nl ${act?'act':''} ${!uk?'lk':''}" ${uk?`onclick="goLesson(${bi},'${l.id}')"`:''}><div class="nd" style="background:${bg};color:${tc}">${dn?'\u2713':!uk?'\u{1F512}':li+1}</div><div class="nt">${l.title}</div></div>`;
    });
  });
  document.getElementById('sbn').innerHTML=h;
}

// ── HOME ──
function showHome(){
  S.view='home';S.cur=null;sv();renderSB();
  const items=DATA.map((b,bi)=>`<div class="bi" onclick="goFirst(${bi})"><div class="be">${b.emoji}</div><div><div class="bt">Bloc ${b.id} \u2014 ${b.title}</div><div class="bs">${b.lessons.length} le\u00e7on${b.lessons.length!==1?'s':''}</div></div></div>`).join('');
  document.getElementById('main').innerHTML=`
    <div class="hh">
      <h1>Bienvenue dans<br><em>Dresskool</em></h1>
      <p>La formation compl\u00e8te pour structurer une activit\u00e9 de revente professionnelle sur Vinted avec DressKare.</p>
      <div class="htags"><span class="htag">8 blocs</span><span class="htag">9 le\u00e7ons</span><span class="htag">Quiz d\u00e9di\u00e9s</span><span class="htag">Exercices terrain</span></div>
    </div>
    <div class="hcard"><h3>Les 8 blocs de la formation</h3><div class="bgrid">${items}</div></div>
    <button class="btnst" onclick="goFirst(0)">Commencer le Bloc 1 \u2192</button>`;
}
function goFirst(bi){const b=DATA[bi];if(b?.lessons.length)goLesson(bi,b.lessons[0].id);}

// ── LESSON ──
function goLesson(bi,lid){
  const bloc=DATA[bi],li=bloc.lessons.findIndex(l=>l.id===lid);
  if(li<0)return;
  if(!unlocked(bi,li)){
    S.view='lesson';S.cur={bi,lid};sv();renderSB();
    document.getElementById('main').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;text-align:center"><div style="font-size:48px">\u{1F512}</div><div style="font-family:\'DM Serif Display\',serif;font-size:22px">Module verrouill\u00e9</div><div style="font-size:14px;color:#9a9590;max-width:280px;line-height:1.6">Valide les le\u00e7ons pr\u00e9c\u00e9dentes pour d\u00e9bloquer ce contenu.</div></div>';
    return;
  }
  S.view='lesson';S.cur={bi,lid};sv();renderSB();
  const l=bloc.lessons[li];
  const dn=!!S.done[lid],sub=!!S.sub[lid],ans=S.ans[lid]||[null,null,null];

  const qItems=l.quiz.map((q,qi)=>{
    const opts=q.opts.map((opt,oi)=>{
      let cls='';
      if(sub||dn){cls=oi===q.ok?'ok':oi===ans[qi]&&oi!==q.ok?'ng':'fz';}
      else if(ans[qi]===oi)cls='sl';
      const dot=(sub||dn)&&oi===q.ok?'\u2713':(sub||dn)&&oi===ans[qi]&&oi!==q.ok?'\u2717':ans[qi]===oi?'\u25cf':'';
      return `<div class="qo ${cls}" data-qi="${qi}" data-oi="${oi}"><div class="od">${dot}</div>${opt}</div>`;
    }).join('');
    return `<div class="qq"><div class="qn">Question ${qi+1} / ${l.quiz.length}</div><div class="qt">${q.q}</div>${opts}</div>`;
  }).join('');

  const allAns=ans.every(a=>a!==null);
  let res='';
  if(dn)res='<div class="rdn">\u2705 Le\u00e7on valid\u00e9e\u00a0!</div><button class="btnnx" onclick="nextLesson()">Le\u00e7on suivante \u2192</button>';
  else if(sub){
    const sc=l.quiz.filter((q,qi)=>ans[qi]===q.ok).length;
    res=sc>=2
      ?`<div class="rok">\u{1F389} ${sc}/${l.quiz.length} \u2014 Le\u00e7on valid\u00e9e\u00a0!</div><button class="btnnx" onclick="nextLesson()">Le\u00e7on suivante \u2192</button>`
      :`<div class="rng">\u{1F605} ${sc}/${l.quiz.length} \u2014 Il faut 2/3 minimum. Relis la le\u00e7on et <button class="btnrt" onclick="retryQuiz('${lid}',${bi})">r\u00e9essaye</button>.</div>`;
  }

  document.getElementById('main').innerHTML=`
    <div class="lbadge" style="background:${bloc.color};color:${bloc.tc}">${bloc.emoji} Bloc ${bloc.id} \u2014 ${bloc.short}</div>
    <div class="ltit">${l.title}</div>
    <div class="lmeta"><span>\u{1F4D6} ${l.type}</span><span>\u23f1 ${l.duree}</span></div>
    <div class="lbody">${l.body}</div>
    <div class="qbox" id="qbox">
      <div class="qhdr"><div class="qico">\u{1F393}</div><div><div class="qtit">Quiz de validation</div><div class="qsub">2 bonnes r\u00e9ponses sur 3 pour valider et d\u00e9bloquer la suite</div></div></div>
      ${qItems}
      ${!sub&&!dn?`<button class="btnsub" id="btnsub" ${allAns?'':'disabled'}>Valider mes r\u00e9ponses</button>`:''}
      ${res}
    </div>
    <div class="exbox"><div class="exl">\u{1F3AF} Exercice pratique</div><div class="ext">\u00c0 faire maintenant</div><div class="exb">${l.exercise}</div></div>
    <div style="height:60px"></div>`;

  // Quiz events
  document.querySelectorAll('.qo').forEach(el=>{
    el.addEventListener('click',()=>{
      if(S.sub[lid]||S.done[lid])return;
      const qi=+el.dataset.qi,oi=+el.dataset.oi;
      if(!S.ans[lid])S.ans[lid]=[null,null,null];
      S.ans[lid][qi]=oi;sv();
      el.closest('.qq').querySelectorAll('.qo').forEach((o,i)=>{
        o.className='qo'+(i===oi?' sl':'');
        o.querySelector('.od').textContent=i===oi?'\u25cf':'';
      });
      const btn=document.getElementById('btnsub');
      if(btn)btn.disabled=!S.ans[lid].every(a=>a!==null);
    });
  });

  document.getElementById('btnsub')?.addEventListener('click',()=>{
    const myAns=S.ans[lid]||[];
    const sc=l.quiz.filter((q,qi)=>myAns[qi]===q.ok).length;
    S.sub[lid]=true;if(sc>=2)S.done[lid]=true;sv();renderSB();
    const box=document.getElementById('qbox');
    box.querySelectorAll('.qq').forEach((qEl,qi)=>{
      qEl.querySelectorAll('.qo').forEach((o,oi)=>{
        o.className='qo '+(oi===l.quiz[qi].ok?'ok':oi===myAns[qi]&&oi!==l.quiz[qi].ok?'ng':'fz');
        o.querySelector('.od').textContent=oi===l.quiz[qi].ok?'\u2713':oi===myAns[qi]&&oi!==l.quiz[qi].ok?'\u2717':'';
      });
    });
    document.getElementById('btnsub')?.remove();
    const resDiv=document.createElement('div');
    if(sc>=2){
      resDiv.className='rok';
      resDiv.textContent=`\u{1F389} ${sc}/${l.quiz.length} \u2014 Le\u00e7on valid\u00e9e\u00a0!`;
      box.appendChild(resDiv);
      const nb=document.createElement('button');nb.className='btnnx';
      nb.textContent='Le\u00e7on suivante \u2192';nb.onclick=nextLesson;box.appendChild(nb);
    }else{
      resDiv.className='rng';
      resDiv.innerHTML=`\u{1F605} ${sc}/${l.quiz.length} \u2014 Il faut 2/3 minimum. Relis la le\u00e7on et <button class="btnrt" onclick="retryQuiz('${lid}',${bi})">r\u00e9essaye</button>.`;
      box.appendChild(resDiv);
    }
  });

  document.querySelector('.ct').scrollTop=0;
}

function retryQuiz(lid,bi){S.ans[lid]=[null,null,null];S.sub[lid]=false;sv();goLesson(bi,lid);}
function nextLesson(){
  if(!S.cur)return;
  const {bi,lid}=S.cur,bloc=DATA[bi],li=bloc.lessons.findIndex(l=>l.id===lid);
  if(li<bloc.lessons.length-1)goLesson(bi,bloc.lessons[li+1].id);
  else if(bi<DATA.length-1){const nb=DATA[bi+1];if(nb.lessons.length)goLesson(bi+1,nb.lessons[0].id);else showHome();}
  else showHome();
}

</script>
