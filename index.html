const TOTAL = DATA.reduce((a,b)=>a+b.lessons.length,0);

// Clear old state on version change
const VER = 'dk10';
let S = {user:'',view:'home',cur:null,done:{},ans:{},sub:{}};
function sv(){try{localStorage.setItem(VER,JSON.stringify(S));}catch(e){}}
function ld(){try{const d=localStorage.getItem(VER);if(d)Object.assign(S,JSON.parse(d));}catch(e){}}
ld();

const pct=()=>TOTAL?Math.round(Object.keys(S.done).length/TOTAL*100):0;
function unlocked(bi,li){return true;}

// 芒聰聙芒聰聙 AUTH 芒聰聙芒聰聙
document.getElementById('btnlogin').onclick=doLogin;
document.getElementById('iname').onkeydown=e=>{if(e.key==='Enter')doLogin();};
document.getElementById('btnlo').onclick=doLogout;

function doLogin(){
  const n=document.getElementById('iname').value.trim();
  if(!n){document.getElementById('iname').focus();return;}
  S.user=n;sv();
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('visible');
  boot();
}
function doLogout(){
  S.user='';sv();
  document.getElementById('login').style.display='flex';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('iname').value='';
}

// Auto-login if returning user
if(S.user){
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('visible');
  boot();
}

function boot(){
  document.getElementById('sbu').textContent='Bonjour '+S.user+' \u{1F44B}';
  renderSB();
  if(S.view==='lesson'&&S.cur)goLesson(S.cur.bi,S.cur.lid);
  else showHome();
}

// 芒聰聙芒聰聙 SIDEBAR 芒聰聙芒聰聙
function renderSB(){
  document.getElementById('spct').textContent=pct()+'%';
  document.getElementById('pfil').style.width=pct()+'%';
  let h=`<div class="nhome ${S.view==='home'?'act':''}" onclick="showHome()">\u{1F3E0} Accueil</div>`;
  DATA.forEach((bloc,bi)=>{
    h+=`<div class="nbl">${bloc.emoji} ${bloc.short}</div>`;
    if(!bloc.lessons.length){
      h+=`<div class="nl lk"><div class="nd" style="background:#f0f0ee;color:#b0aca6;font-size:8px">\u2736</div><div class="nt" style="color:#b0aca6;font-size:10.5px">\u00c0 venir</div></div>`;
      return;
    }
    bloc.lessons.forEach((l,li)=>{
      const uk=unlocked(bi,li),dn=!!S.done[l.id],act=S.cur?.lid===l.id;
      const [bg,tc]=dn?['#dcfce7','#15803d']:act?['#dbeafe','#2952e3']:!uk?['#f0f0ee','#b0aca6']:['#f0f0ee','#6b6762'];
      h+=`<div class="nl ${act?'act':''} ${!uk?'lk':''}" ${uk?`onclick="goLesson(${bi},'${l.id}')"`:''}><div class="nd" style="background:${bg};color:${tc}">${dn?'\u2713':!uk?'\u{1F512}':li+1}</div><div class="nt">${l.title}</div></div>`;
    });
  });
  document.getElementById('sbn').innerHTML=h;
}

// 芒聰聙芒聰聙 LESSON 芒聰聙芒聰聙
function goLesson(bi,lid){
  const bloc=DATA[bi],li=bloc.lessons.findIndex(l=>l.id===lid);
  if(li<0)return;
  if(!unlocked(bi,li)){
    S.view='lesson';S.cur={bi,lid};sv();renderSB();
    document.getElementById('main').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;text-align:center"><div style="font-size:48px">\u{1F512}</div><div style="font-family:\'DM Serif Display\',serif;font-size:22px">Module verrouill\u00e9</div><div style="font-size:14px;color:#9a9590;max-width:280px;line-height:1.6">Valide les le\u00e7ons pr\u00e9c\u00e9dentes pour d\u00e9bloquer ce contenu.</div></div>';
    return;
  }
  S.view='lesson';S.cur={bi,lid};sv();renderSB();
  const l=bloc.lessons[li];
  const dn=!!S.done[lid],sub=!!S.sub[lid],ans=S.ans[lid]||[null,null,null];

  const qItems=l.quiz.map((q,qi)=>{
    const opts=q.opts.map((opt,oi)=>{
      let cls='';
      if(sub||dn){cls=oi===q.ok?'ok':oi===ans[qi]&&oi!==q.ok?'ng':'fz';}
      else if(ans[qi]===oi)cls='sl';
      const dot=(sub||dn)&&oi===q.ok?'\u2713':(sub||dn)&&oi===ans[qi]&&oi!==q.ok?'\u2717':ans[qi]===oi?'\u25cf':'';
      return `<div class="qo ${cls}" data-qi="${qi}" data-oi="${oi}"><div class="od">${dot}</div>${opt}</div>`;
    }).join('');
    return `<div class="qq"><div class="qn">Question ${qi+1} / ${l.quiz.length}</div><div class="qt">${q.q}</div>${opts}</div>`;
  }).join('');

  const allAns=ans.every(a=>a!==null);
  let res='';
  if(dn)res='<div class="rdn">\u2705 Le\u00e7on valid\u00e9e\u00a0!</div><button class="btnnx" onclick="nextLesson()">Le\u00e7on suivante \u2192</button>';
  else if(sub){
    const sc=l.quiz.filter((q,qi)=>ans[qi]===q.ok).length;
    res=sc>=2
      ?`<div class="rok">\u{1F389} ${sc}/${l.quiz.length} \u2014 Le\u00e7on valid\u00e9e\u00a0!</div><button class="btnnx" onclick="nextLesson()">Le\u00e7on suivante \u2192</button>`
      :`<div class="rng">\u{1F605} ${sc}/${l.quiz.length} \u2014 Il faut 2/3 minimum. Relis la le\u00e7on et <button class="btnrt" onclick="retryQuiz('${lid}',${bi})">r\u00e9essaye</button>.</div>`;
  }

  document.getElementById('main').innerHTML=`
    <div class="lbadge" style="background:${bloc.color};color:${bloc.tc}">${bloc.emoji} Bloc ${bloc.id} \u2014 ${bloc.short}</div>
    <div class="ltit">${l.title}</div>
    <div class="lmeta"><span>\u{1F4D6} ${l.type}</span><span>\u23f1 ${l.duree}</span></div>
    <div class="lbody">${l.body}</div>
    <div class="qbox" id="qbox">
      <div class="qhdr"><div class="qico">\u{1F393}</div><div><div class="qtit">Quiz de validation</div><div class="qsub">2 bonnes r\u00e9ponses sur 3 pour valider et d\u00e9bloquer la suite</div></div></div>
      ${qItems}
      ${!sub&&!dn?`<button class="btnsub" id="btnsub" ${allAns?'':'disabled'}>Valider mes r\u00e9ponses</button>`:''}
      ${res}
    </div>
    <div class="exbox"><div class="exl">\u{1F3AF} Exercice pratique</div><div class="ext">\u00c0 faire maintenant</div><div class="exb">${l.exercise}</div></div>
    <div style="height:60px"></div>`;

  // Quiz events
  document.querySelectorAll('.qo').forEach(el=>{
    el.addEventListener('click',()=>{
      if(S.sub[lid]||S.done[lid])return;
      const qi=+el.dataset.qi,oi=+el.dataset.oi;
      if(!S.ans[lid])S.ans[lid]=[null,null,null];
      S.ans[lid][qi]=oi;sv();
      el.closest('.qq').querySelectorAll('.qo').forEach((o,i)=>{
        o.className='qo'+(i===oi?' sl':'');
        o.querySelector('.od').textContent=i===oi?'\u25cf':'';
      });
      const btn=document.getElementById('btnsub');
      if(btn)btn.disabled=!S.ans[lid].every(a=>a!==null);
    });
  });

  document.getElementById('btnsub')?.addEventListener('click',()=>{
    const myAns=S.ans[lid]||[];
    const sc=l.quiz.filter((q,qi)=>myAns[qi]===q.ok).length;
    S.sub[lid]=true;if(sc>=2)S.done[lid]=true;sv();renderSB();
    const box=document.getElementById('qbox');
    box.querySelectorAll('.qq').forEach((qEl,qi)=>{
      qEl.querySelectorAll('.qo').forEach((o,oi)=>{
        o.className='qo '+(oi===l.quiz[qi].ok?'ok':oi===myAns[qi]&&oi!==l.quiz[qi].ok?'ng':'fz');
        o.querySelector('.od').textContent=oi===l.quiz[qi].ok?'\u2713':oi===myAns[qi]&&oi!==l.quiz[qi].ok?'\u2717':'';
      });
    });
    document.getElementById('btnsub')?.remove();
    const resDiv=document.createElement('div');
    if(sc>=2){
      resDiv.className='rok';
      resDiv.textContent=`\u{1F389} ${sc}/${l.quiz.length} \u2014 Le\u00e7on valid\u00e9e\u00a0!`;
      box.appendChild(resDiv);
      const nb=document.createElement('button');nb.className='btnnx';
      nb.textContent='Le\u00e7on suivante \u2192';nb.onclick=nextLesson;box.appendChild(nb);
    }else{
      resDiv.className='rng';
      resDiv.innerHTML=`\u{1F605} ${sc}/${l.quiz.length} \u2014 Il faut 2/3 minimum. Relis la le\u00e7on et <button class="btnrt" onclick="retryQuiz('${lid}',${bi})">r\u00e9essaye</button>.`;
      box.appendChild(resDiv);
    }
  });

  document.querySelector('.ct').scrollTop=0;
}

function retryQuiz(lid,bi){S.ans[lid]=[null,null,null];S.sub[lid]=false;sv();goLesson(bi,lid);}
function nextLesson(){
  if(!S.cur)return;
  const {bi,lid}=S.cur,bloc=DATA[bi],li=bloc.lessons.findIndex(l=>l.id===lid);
  if(li<bloc.lessons.length-1)goLesson(bi,bloc.lessons[li+1].id);
  else if(bi<DATA.length-1){const nb=DATA[bi+1];if(nb.lessons.length)goLesson(bi+1,nb.lessons[0].id);else showHome();}
  else showHome();
}

</script>
